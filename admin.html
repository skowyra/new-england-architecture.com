<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Admin - Mackenzie James Media</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .admin-header {
            background: #2563eb;
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .admin-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .admin-content {
            padding: 2rem;
        }

        .tour-selector {
            margin-bottom: 2rem;
        }

        .tour-selector select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
        }

        .tour-editor {
            display: none;
            background: #f8fafc;
            padding: 2rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .tour-editor.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .scenes-section {
            margin-top: 2rem;
        }

        .scenes-section h3 {
            margin-bottom: 1rem;
            color: #1f2937;
        }

        .scene-item {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            position: relative;
        }

        .scene-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .scene-header h4 {
            color: #1f2937;
        }

        .remove-scene {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .add-scene {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .save-tour {
            background: #2563eb;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .save-tour:hover {
            background: #1d4ed8;
        }

        .status-message {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }

        .status-message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }

        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }

        .preview-link {
            display: inline-block;
            margin-left: 1rem;
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .preview-link:hover {
            text-decoration: underline;
        }

        .backup-section {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #fef3c7;
            border-radius: 8px;
            border: 1px solid #f59e0b;
        }

        .backup-section h3 {
            color: #92400e;
            margin-bottom: 1rem;
        }

        .backup-buttons {
            display: flex;
            gap: 1rem;
        }

        .backup-btn {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Virtual Tour Administration</h1>
            <p>Manage your property virtual tours</p>
        </div>

        <div class="admin-content">
            <div class="status-message" id="statusMessage"></div>

            <div class="tour-selector">
                <label for="tourSelect">Select Tour to Edit:</label>
                <select id="tourSelect">
                    <option value="">Choose a tour...</option>
                    <option value="modern-downtown-condo">Modern Downtown Condo</option>
                    <option value="luxury-family-home">Luxury Family Home</option>
                    <option value="commercial-office">Commercial Office Space</option>
                </select>
                <a href="../index.html" class="preview-link" target="_blank">← Back to Website</a>
            </div>

            <div class="tour-editor" id="tourEditor">
                <form id="tourForm">
                    <div class="form-group">
                        <label for="tourTitle">Tour Title:</label>
                        <input type="text" id="tourTitle" name="title" required>
                    </div>

                    <div class="form-group">
                        <label for="tourDescription">Tour Description:</label>
                        <textarea id="tourDescription" name="description" required></textarea>
                    </div>

                    <div class="scenes-section">
                        <h3>Tour Scenes</h3>
                        <button type="button" class="add-scene" onclick="addScene()">+ Add Scene</button>
                        <div id="scenesContainer"></div>
                    </div>

                    <button type="submit" class="save-tour">Save Tour</button>
                </form>
            </div>

            <div class="backup-section">
                <h3>Backup & Restore</h3>
                <p>Create backups before making major changes.</p>
                <div class="backup-buttons">
                    <button class="backup-btn" onclick="createBackup()">Create Backup</button>
                    <button class="backup-btn" onclick="downloadConfig()">Download Config</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/tour-admin.js"></script>
</body>
</html>
