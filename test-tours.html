<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .test-buttons {
            margin: 20px 0;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #console {
            background: #000;
            color: #00ff00;
            padding: 10px;
            font-family: monospace;
            height: 300px;
            overflow-y: scroll;
            white-space: pre-wrap;
        }
    </style>
    <!-- Marzipano Library -->
    <script src="https://unpkg.com/marzipano@0.10.2/dist/marzipano.js"></script>
    <!-- Components -->
    <script src="js/components/marzipano-viewer.js" defer></script>
</head>
<body>
    <h1>Tour Loading Test</h1>
    
    <div class="test-buttons">
        <button onclick="testTourConfig()">Test Tour Config</button>
        <button onclick="testMarzipanoLoad()">Test Marzipano Library</button>
        <button onclick="testTourModal()">Test Tour Modal</button>
        <button onclick="clearConsole()">Clear Console</button>
    </div>
    
    <div id="console"></div>
    
    <!-- Hidden viewer for testing -->
    <marzipano-viewer style="display: none;"></marzipano-viewer>
    
    <script>
        // Capture console logs
        const consoleDiv = document.getElementById('console');
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function addToConsole(message, type = 'log') {
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#ff4444' : type === 'warn' ? '#ffaa00' : '#00ff00';
            consoleDiv.innerHTML += `<span style="color: ${color}">[${timestamp}] ${message}</span>\n`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole('ERROR: ' + args.join(' '), 'error');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addToConsole('WARN: ' + args.join(' '), 'warn');
        };
        
        async function testTourConfig() {
            console.log('Testing tour configuration loading...');
            try {
                const response = await fetch('tours/tour-config.json');
                const config = await response.json();
                console.log('Tour config loaded successfully:', Object.keys(config.virtualTours));
                
                // Test specific property
                const modernCondo = config.virtualTours['modern-downtown-condo'];
                if (modernCondo) {
                    console.log('Modern condo tour:', modernCondo.title, '- Scenes:', modernCondo.scenes.length);
                } else {
                    console.error('Modern condo tour not found!');
                }
            } catch (error) {
                console.error('Failed to load tour config:', error);
            }
        }
        
        function testMarzipanoLoad() {
            console.log('Testing Marzipano library...');
            if (typeof Marzipano !== 'undefined') {
                console.log('Marzipano library loaded successfully!');
                console.log('Marzipano version:', Marzipano.version || 'Unknown');
            } else {
                console.error('Marzipano library not loaded!');
            }
        }
        
        function testTourModal() {
            console.log('Testing tour modal creation...');
            
            // Simulate a property card event
            const testProperty = {
                id: 'modern-downtown-condo',
                title: 'Test Modern Condo',
                location: 'Test Location'
            };
            
            const event = new CustomEvent('openVirtualTour', {
                detail: {
                    property: testProperty,
                    tourPath: 'modern-downtown-condo'
                },
                bubbles: true
            });
            
            console.log('Dispatching openVirtualTour event...');
            document.dispatchEvent(event);
        }
        
        function clearConsole() {
            consoleDiv.innerHTML = '';
        }
        
        // Log when page loads
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Test page loaded');
            console.log('Marzipano available:', typeof Marzipano !== 'undefined');
        });
    </script>
</body>
</html>
