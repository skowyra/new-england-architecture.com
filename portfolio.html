<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio - Mackenzie James Studio</title>
    <meta
      name="description"
      content="View our portfolio of professional real estate photography and virtual tours."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css" />

    <!-- Marzipano Library - Load first without defer -->
    <script src="https://unpkg.com/marzipano@0.10.2/dist/marzipano.js"></script>

    <!-- Web Components -->
    <script src="components/header/mj-header.js" defer></script>
    <script src="components/footer/mj-footer.js" defer></script>
    <script src="js/components/image-gallery.js" defer></script>

    <!-- Main App -->
    <script src="js/app.js" defer></script>
  </head>
  <body id="top">
    <!-- Header Component -->
    <mj-header></mj-header>
    <main>
      <section class="page-title">
        <h1>Portfolio</h1>
      </section>

      <!-- Image Gallery -->
      <section class="portfolio-gallery">
        <div class="container">
          <h2>Residential</h2>
          <image-gallery>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/Residentail/PalmerRd/KitchenSPP-2026-01-04-X2D.jpg" data-alt="Modern dining room"></div>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/Residentail/PalmerRd/KitchenOven-2026-01-04-X2D.jpg" data-alt="Modern dining room"></div>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/Residentail/DiningRoom.jpg" data-alt="Modern dining room"></div>
          </image-gallery>
        </div>
      </section>

      <!-- Portfolio Content Goes Here -->
       <section class="portfolio-gallery">
        <div class="container">
          <h2>Commercial</h2>
          <image-gallery>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/Commercial/Quechee/Quechee-MainRm.jpg" data-alt=""></div>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/Commercial/Quechee/Quechee-Rm24-EntryRight.jpg" data-alt=""></div>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/Commercial/Quechee/Quechee-Rm24-Bed-SinglePoint.jpg" data-alt=""></div>
          </image-gallery>
        </div>
      </section>

       <section class="portfolio-gallery">
        <div class="container">
          <h2>Design</h2>
          <image-gallery>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/Residentail/BronzeVase.jpg" data-alt=""></div>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/Commercial/Verve/VerveMotorcycle%20(1%20of%201).jpg" data-alt=""></div>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/Residentail/BrandyGlass.jpg" data-alt=""></div>
          </image-gallery>
        </div>
      </section>

      <section class="portfolio-gallery">
        <div class="container">
          <h2>Product 
          </h2>
          <image-gallery>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/assets/Crayons2.jpg" data-alt="crayons"></div>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/assets/IceBreakerGFX.jpg" data-alt="mints"></div>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/assets/TenderLoveCarryBagBeigeScarf2-1200w.jpg" data-alt="travel bag"></div>
          </image-gallery>
        </div>
      </section>

       <section class="portfolio-gallery">
        <div class="container">
          <h2>Studio 
          </h2>
          <image-gallery>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/assets/StillLifeFruitAndCheeseTable1200.jpg" data-alt=""></div>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/assets/Violin2Portrait-HB.jpg" data-alt=""></div>
            <div data-image="https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/assets/LemonTea-Velvia%20(1%20of%201).jpg" data-alt=""></div>
          </image-gallery>
        </div>
      </section>

    </main>

    <!-- Footer Component -->
    <mj-footer></mj-footer>

    <!-- Hidden Marzipano Viewer for Virtual Tours -->
    <marzipano-viewer style="display: none"></marzipano-viewer>
  </body>
</html>
