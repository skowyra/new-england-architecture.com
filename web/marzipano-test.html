<!DOCTYPE html>
<html>
<head>
    <title>Marzipano Test - Digital Ocean Spaces</title>
    <style>
        #viewer {
            width: 800px;
            height: 500px;
            background: #000;
            margin: 20px auto;
        }
        .loading {
            color: white;
            text-align: center;
            padding-top: 200px;
        }
        .error {
            color: red;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Testing Marzipano with Digital Ocean Spaces</h1>
    <div id="viewer">
        <div class="loading">Loading 360° view...</div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marzipano@0.10.2/dist/marzipano.js"></script>
    <script>
        console.log('Testing URL:', 'https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/tours/kitchen-cors.jpg');
        
        // Test if image can be loaded first
        const testImg = new Image();
        testImg.crossOrigin = "anonymous";
        testImg.onload = function() {
            console.log('Image loaded successfully, initializing Marzipano...');
            initMarzipano();
        };
        testImg.onerror = function(error) {
            console.error('Image failed to load:', error);
            document.getElementById('viewer').innerHTML = '<div class="error">Error: Cannot load image from Digital Ocean Spaces. This is likely a CORS issue.</div>';
        };
        testImg.src = 'https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/tours/kitchen-cors.jpg';
        
        function initMarzipano() {
            try {
                const viewer = new Marzipano.Viewer(document.getElementById('viewer'));
                const source = Marzipano.ImageUrlSource.fromString('https://mackenziejames.nyc3.cdn.digitaloceanspaces.com/tours/kitchen-cors.jpg');
                const geometry = new Marzipano.EquirectGeometry([
                    { width: 4096 },
                    { width: 2048 },
                    { width: 1024 }
                ]);
                const view = new Marzipano.RectilinearView();
                const scene = viewer.createScene({
                    source: source,
                    geometry: geometry,
                    view: view
                });
                
                scene.switchTo().then(function() {
                    console.log('Marzipano scene loaded successfully!');
                }).catch(function(error) {
                    console.error('Marzipano error:', error);
                    document.getElementById('viewer').innerHTML = '<div class="error">Marzipano Error: ' + error.message + '</div>';
                });
            } catch (error) {
                console.error('Marzipano initialization error:', error);
                document.getElementById('viewer').innerHTML = '<div class="error">Initialization Error: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
