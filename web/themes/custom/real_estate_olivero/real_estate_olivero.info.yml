name: Real Estate Olivero
type: theme
description: 'A custom subtheme based on Olivero, optimized for real estate photography.'
package: Custom
version: '1.0'
core_version_requirement: ^10 || ^11

base theme: olivero

# Define regions (inherits from Olivero but can override)
regions:
  header: 'Header'
  primary_menu: 'Primary menu'
  secondary_menu: 'Secondary menu'
  hero: 'Hero'
  highlighted: 'Highlighted'
  breadcrumb: 'Breadcrumb'
  content: 'Content'
  sidebar: 'Sidebar'
  content_below: 'Content Below'
  footer_top: 'Footer Top'
  footer_bottom: 'Footer Bottom'

# Custom libraries for your real estate site
libraries:
  - real_estate_olivero/global-styling
  - real_estate_olivero/photography-enhancements

# Remove unnecessary libraries
libraries-override:
  olivero/maintenance-page: false

# Component libraries that can be loaded as needed
libraries-extend:
  olivero/global-styling:
    - real_estate_olivero/photography-enhancements
