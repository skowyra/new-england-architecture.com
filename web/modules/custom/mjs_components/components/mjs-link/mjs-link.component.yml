$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Link
description: A link, opened in a new tab. Accepts absolute or relative URLs.
status: stable
group: MJS Components
libraryOverrides:
  css:
    component:
      mjs-link.css: {}
props:
  type: object
  required:
    - label
    - url
  properties:
    label:
      type: string
      title: Label
      examples:
        - Visit our partner site
    url:
      type: string
      title: URL
      format: uri-reference
      examples:
        - https://www.drupal.org
        - /about
