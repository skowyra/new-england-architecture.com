$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Link
description: A link to an external website, opened in a new tab.
status: stable
group: MJS Components
libraryOverrides:
  css:
    component:
      mjs-link.css: {}
props:
  type: object
  required:
    - label
    - url
  properties:
    label:
      type: string
      title: Label
      examples:
        - Visit our partner site
    url:
      type: string
      title: URL
      format: uri
      x-allowed-schemes:
        - http
        - https
      examples:
        - https://www.drupal.org
