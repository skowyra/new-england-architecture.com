$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Image with Caption
description: An image with a photography credit and an optional caption.
status: stable
group: MJS Components
libraryOverrides:
  js:
    mjs-image-caption.js: {}
  css:
    component:
      mjs-image-caption.css: {}
props:
  type: object
  required:
    - src
  properties:
    src:
      type: string
      title: Image URL
      format: uri
      x-allowed-schemes:
        - http
        - https
      examples:
        - https://placehold.co/600x400
    alt:
      type: string
      title: Alt text
      examples:
        - A description of the image
    caption:
      type: string
      title: Caption
