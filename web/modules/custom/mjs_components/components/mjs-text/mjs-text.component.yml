$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Text
description: A rich text block edited with CKEditor.
status: stable
group: MJS Components
libraryOverrides:
  css:
    component:
      mjs-text.css: {}
props:
  type: object
  required:
    - content
  properties:
    content:
      type: string
      title: Content
      contentMediaType: text/html
      x-formatting-context: block
      examples:
        - '<p>Add your content here.</p>'
